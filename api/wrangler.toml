name = "clarmory-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.sql"]
fallthrough = false

[[d1_databases]]
binding = "DB"
database_name = "clarmory-db"
database_id = "local"  # placeholder — replace with real ID after `wrangler d1 create`
