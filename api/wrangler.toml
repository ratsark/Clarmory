name = "clarmory-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
GITHUB_CLIENT_ID = "Ov23liMBuSxFKAi3NaXi"
# ADMIN_SECRET is stored as a Worker secret (wrangler secret put ADMIN_SECRET)
# For local dev/testing, set ADMIN_SECRET = "test-secret" here temporarily

[[rules]]
type = "Text"
globs = ["**/*.sql"]
fallthrough = false

[[d1_databases]]
binding = "DB"
database_name = "clarmory-db"
database_id = "0847be30-4850-4f64-8d8c-bdbeadb52e51"

[[routes]]
pattern = "api.clarmory.com"
custom_domain = true
